<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBR SLS BLOOPERS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body {
            background-color: #000;
            margin: 0;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            color: #22c55e;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            image-rendering: pixelated;
        }

        .crt-overlay {
            pointer-events: none;
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            opacity: 0.15;
            z-index: 10;
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: #18181b;
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: #22c55e;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #22c55e;
        }

        .recording-pulse {
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Capas de Video y Renderizado -->
    <video id="webcam" autoplay playsinline muted class="hidden"></video>
    <canvas id="mainCanvas" class="w-full h-full object-contain"></canvas>
    <div class="crt-overlay"></div>

    <!-- UI - Cabecera -->
    <div id="hud-top" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none z-20">
        <div class="flex flex-col gap-2">
            <div class="bg-black/80 px-3 py-1.5 border border-green-500/40 rounded flex items-center gap-2 backdrop-blur-md">
                <div id="ai-status-led" class="w-2 h-2 bg-yellow-500 rounded-full"></div>
                <span class="text-[10px] font-bold tracking-widest text-white uppercase" id="status-text">Cargando Motor IA...</span>
            </div>
            <div id="rec-indicator" class="hidden flex flex-col items-center">
                 <div class="bg-red-600/30 px-4 py-1.5 border border-red-500 rounded-full flex items-center gap-2 backdrop-blur-xl">
                    <div class="w-2 h-2 bg-red-600 rounded-full recording-pulse"></div>
                    <span class="text-[12px] font-black text-white" id="rec-timer">00:00</span>
                 </div>
                 <span class="text-[7px] text-red-500 mt-1 uppercase font-bold italic tracking-widest">Grabando anomalias...</span>
            </div>
        </div>
        <div class="pointer-events-auto">
            <div class="bg-black/80 px-3 py-1.5 border border-white/10 rounded flex items-center gap-2">
                <svg id="mic-icon" class="w-3 h-3 text-white/20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                <span class="text-[8px] font-bold text-white/40 uppercase">Audio Ambiental</span>
            </div>
        </div>
    </div>

    <!-- UI - Dock de Control Inferior -->
    <div id="hud-bottom" class="absolute bottom-0 left-0 w-full p-4 flex flex-col md:flex-row justify-between items-end gap-4 z-20">
        <!-- Panel Técnico -->
        <div class="w-full md:w-[380px] bg-zinc-950/95 p-3 rounded-2xl border border-white/10 backdrop-blur-3xl space-y-3 pointer-events-auto">
            <div class="flex items-center justify-between px-1">
                <div class="flex items-center gap-2 text-[9px] font-black text-green-400 uppercase tracking-tighter">
                   <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M11 15h2v2h-2v-2m0-8h2v6h-2V7m1-5C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2m0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                   ISO_auto: <span id="iso-val">3200</span>
                </div>
                <div class="text-[7px] font-bold text-white/20 uppercase tracking-[0.2em]">Kinect_SLS_Emu</div>
            </div>
            <div class="flex gap-1">
                <button onclick="setFilter('NVG')" class="filter-btn flex-1 py-1.5 text-[7px] border border-white/40 bg-white/10 text-white rounded-sm uppercase font-black" data-mode="NVG">NVG</button>
                <button onclick="setFilter('THERMAL')" class="filter-btn flex-1 py-1.5 text-[7px] border border-white/5 text-white/20 rounded-sm uppercase font-black" data-mode="THERMAL">Thermal</button>
                <button onclick="setFilter('GHOST')" class="filter-btn flex-1 py-1.5 text-[7px] border border-white/5 text-white/20 rounded-sm uppercase font-black" data-mode="GHOST">Ghost</button>
                <button onclick="setFilter('DAYLIGHT')" class="filter-btn flex-1 py-1.5 text-[7px] border border-white/5 text-white/20 rounded-sm uppercase font-black" data-mode="DAYLIGHT">Day</button>
            </div>
        </div>

        <!-- Botones de Acción -->
        <div class="flex flex-row md:flex-col items-center gap-4 w-full md:w-auto justify-center mb-2 pointer-events-auto">
            <button id="photoBtn" class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center bg-zinc-900/60 text-white active:scale-75 shadow-lg transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
            <button id="recBtn" class="w-16 h-16 rounded-full border-4 border-zinc-800 bg-zinc-900/80 text-red-500 flex flex-col items-center justify-center active:scale-90 transition-all shadow-xl">
                <div id="rec-icon" class="w-7 h-7 bg-red-600 rounded-sm"></div>
                <span id="rec-text" class="text-[7px] mt-1 font-black uppercase tracking-tighter">REC</span>
            </button>
        </div>
    </div>

    <!-- Pantalla de Error -->
    <div id="error-screen" class="hidden absolute inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-12 text-center backdrop-blur-md">
        <svg class="w-16 h-16 text-red-600 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <h2 class="text-xl font-black uppercase text-red-600 italic">HARDWARE FAILURE</h2>
        <p class="text-[10px] text-zinc-500 mb-8 uppercase font-bold tracking-widest" id="error-msg"></p>
        <button onclick="location.reload()" class="bg-red-700 text-white px-10 py-4 rounded-xl font-black text-[9px] uppercase tracking-[0.3em]">RESTART CORE</button>
    </div>

    <!-- Scripts de TF.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0"></script>

    <script>
        // --- CONSTANTES TÉCNICAS (PARANORMAL CONFIG) ---
        const MAX_LIFE = 8000;
        const MISSED_FRAME_LIMIT = 45;
        const SMOOTHING = 0.7;
        const MIN_SCORE = 0.04;
        const AI_BUFFER_W = 256;
        const AI_BUFFER_H = 144;

        // --- REFERENCIAS DOM ---
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('mainCanvas');
        const aiCanvas = document.createElement('canvas');
        const statusText = document.getElementById('status-text');
        const led = document.getElementById('ai-status-led');
        const recTimerText = document.getElementById('rec-timer');
        const isoDisplay = document.getElementById('iso-val');

        // --- ESTADO GLOBAL (REFS) ---
        let detector = null;
        let skeletons = [];
        let filterMode = 'NVG';
        let isoLevel = 3200;
        let isRecording = false;
        let recStartTime = 0;
        let lastAiTime = 0;
        let mediaRecorder = null;
        let chunks = [];
        let audioStream = null;
        let telemetry = { emf: 0.15, temp: 22.4, signal: 98 };

        // --- INICIALIZACIÓN ---
        async function init() {
            try {
                // 1. Inicializar TF Backend
                await tf.setBackend('webgl');
                
                // 2. Cargar Detector MoveNet
                detector = await poseDetection.createDetector(
                    poseDetection.SupportedModels.MoveNet,
                    { 
                        modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING,
                        enableSmoothing: true,
                        multiPoseMaxDetections: 8 
                    }
                );

                // 3. Pre-warm
                aiCanvas.width = AI_BUFFER_W; aiCanvas.height = AI_BUFFER_H;
                await detector.estimatePoses(aiCanvas);

                led.className = "w-2 h-2 bg-green-500 rounded-full animate-pulse";
                statusText.innerText = "OBR SLS BLOOPERS";

                // 4. Iniciar Cámara
                await startCamera();
                
                // 5. Iniciar Render
                requestAnimationFrame(renderLoop);

            } catch (err) {
                showError(err);
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 3840 }, height: { ideal: 2160 }, frameRate: { ideal: 60 } },
                    audio: { echoCancellation: false, autoGainControl: true }
                });
                video.srcObject = stream;
                audioStream = stream;
                document.getElementById('mic-icon').classList.replace('text-white/20', 'text-green-500');
                return new Promise(resolve => video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                });
            } catch (e) {
                showError("Cámara 4K no detectada.");
            }
        }

        // --- MOTOR DE IA & SEGUIMIENTO ---
        async function processAI() {
            if (!detector || video.readyState < 2) return;

            const aiCtx = aiCanvas.getContext('2d');
            aiCtx.drawImage(video, 0, 0, AI_BUFFER_W, AI_BUFFER_H);
            
            // Auto-ISO Logic
            const pixels = aiCtx.getImageData(0,0,AI_BUFFER_W,AI_BUFFER_H).data;
            let lumaTotal = 0;
            for(let i=0; i<pixels.length; i+=400) lumaTotal += (pixels[i]*0.3 + pixels[i+1]*0.59 + pixels[i+2]*0.11);
            const avg = lumaTotal / (pixels.length/400);
            const targetISO = Math.max(800, Math.min(12800, 3200 * (128/(avg+1))));
            isoLevel += (targetISO - isoLevel) * 0.05;
            isoDisplay.innerText = Math.round(isoLevel);

            // Detección
            const poses = await detector.estimatePoses(aiCanvas);
            updateSkeletons(poses);
        }

        function updateSkeletons(newPoses) {
            const now = performance.now();

            // Envejecer
            skeletons.forEach(s => {
                s.life -= Math.min(30, now - s.lastUpdate);
                s.missedFrames++;
                s.lastUpdate = now;
            });

            // Mapear Pareidolia
            newPoses.forEach(pose => {
                const kp = pose.keypoints;
                const torsoCount = [5,6,11,12].filter(i => kp[i].score > 0.15).length;
                const headCount = kp[0].score > 0.15 && (kp[5].score > 0.1 || kp[6].score > 0.1);

                if (pose.score < MIN_SCORE && torsoCount < 3 && !headCount) return;

                let match = skeletons.find(s => {
                    const d = Math.sqrt(Math.pow(s.keypoints[0].x - kp[0].x, 2) + Math.pow(s.keypoints[0].y - kp[0].y, 2));
                    return d < 180;
                });

                if (match) {
                    match.life = MAX_LIFE;
                    match.missedFrames = 0;
                    kp.forEach((p, i) => {
                        match.keypoints[i].x += (p.x - match.keypoints[i].x) * SMOOTHING;
                        match.keypoints[i].y += (p.y - match.keypoints[i].y) * SMOOTHING;
                        match.keypoints[i].score = p.score;
                    });
                } else {
                    skeletons.push({
                        keypoints: JSON.parse(JSON.stringify(kp)),
                        life: MAX_LIFE,
                        missedFrames: 0,
                        score: pose.score,
                        lastUpdate: now
                    });
                }
            });

            skeletons = skeletons.filter(s => s.life > 0 && s.missedFrames < MISSED_FRAME_LIMIT);
        }

        // --- RENDERIZADO ---
        function renderLoop() {
            if (video.readyState >= 2) {
                if (canvas.width !== video.videoWidth) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }

                const ctx = canvas.getContext('2d', { alpha: false });
                const now = performance.now();

                // 1. Fondo con Filtros
                const b = (isoLevel / 2500) + 0.1;
                ctx.save();
                let fStr = "";
                switch(filterMode) {
                    case 'NVG': fStr = `brightness(${b}) contrast(1.8) grayscale(1) sepia(1) hue-rotate(85deg)`; break;
                    case 'THERMAL': fStr = `brightness(${b}) contrast(2.2) saturate(2.5) hue-rotate(-110deg)`; break;
                    case 'GHOST': fStr = `brightness(${b}) contrast(1.6) invert(1) hue-rotate(180deg)`; break;
                    default: fStr = `brightness(${b}) contrast(1.5)`;
                }
                ctx.filter = fStr;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();

                // 2. IA Asíncrona (~30 FPS)
                if (now - lastAiTime > 33) {
                    lastAiTime = now;
                    processAI();
                }

                // 3. Dibujar SLS
                skeletons.forEach(s => drawSkeleton(ctx, s));

                // 4. Dibujar HUD
                drawTelemetryHUD(ctx);
            }
            requestAnimationFrame(renderLoop);
        }

        function drawSkeleton(ctx, s) {
            const color = filterMode === 'GHOST' ? '#00ffff' : '#d946ef';
            const kp = s.keypoints;
            const w = canvas.width;
            const h = canvas.height;
            const sX = w / AI_BUFFER_W;
            const sY = h / AI_BUFFER_H;

            ctx.save();
            ctx.globalAlpha = Math.min(1, s.life / 2000);
            ctx.strokeStyle = color; ctx.fillStyle = color;
            ctx.lineWidth = Math.max(4, w / 400);
            ctx.lineCap = 'round'; ctx.shadowBlur = 15; ctx.shadowColor = color;

            const bones = [[5,7],[7,9],[6,8],[8,10],[11,13],[13,15],[12,14],[14,16]];
            bones.forEach(([i, j]) => {
                if (kp[i].score > 0.05 && kp[j].score > 0.05) {
                    ctx.beginPath(); ctx.moveTo(kp[i].x*sX, kp[i].y*sY); ctx.lineTo(kp[j].x*sX, kp[j].y*sY); ctx.stroke();
                }
            });

            // Torso / Cabeza
            const n=kp[0], sL=kp[5], sR=kp[6], hL=kp[11], hR=kp[12];
            const neckX = (sL.x + sR.x)/2; const neckY = (sL.y + sR.y)/2;
            const hipX = (hL.x + hR.x)/2; const hipY = (hL.y + hR.y)/2;

            ctx.beginPath(); ctx.moveTo(n.x*sX, n.y*sY); ctx.lineTo(neckX*sX, neckY*sY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(sL.x*sX, sL.y*sY); ctx.lineTo(neckX*sX, neckY*sY); ctx.lineTo(sR.x*sX, sR.y*sY); ctx.stroke();
            
            ctx.setLineDash([10,10]);
            ctx.beginPath(); ctx.moveTo(neckX*sX, neckY*sY); ctx.lineTo(hipX*sX, hipY*sY); ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath(); ctx.moveTo(hL.x*sX, hL.y*sY); ctx.lineTo(hipX*sX, hipY*sY); ctx.lineTo(hR.x*sX, hR.y*sY); ctx.stroke();

            ctx.font = 'bold 12px monospace';
            ctx.fillText(`ANOMALÍA_${Math.round(s.score*100)}%`, n.x*sX - 45, n.y*sY - 45);
            ctx.restore();
        }

        function drawTelemetryHUD(ctx) {
            const bW = 280; const bH = 160;
            const m = canvas.width - bW - 40;
            const HUD_TOP = 80;

            ctx.fillStyle = 'rgba(10, 15, 10, 0.96)'; ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(m, HUD_TOP, bW, bH, 2); ctx.fill(); ctx.stroke();

            ctx.fillStyle = '#22c55e'; ctx.font = 'bold 12px monospace';
            ctx.fillText(`TELEMETRÍA_FIELD_OBR`, m + 15, HUD_TOP + 22);
            ctx.fillRect(m + 15, HUD_TOP + 28, bW - 30, 1);

            // Realistic Flicker Telemetry
            const emf = 0.15 + (skeletons.length * (Math.random() * 2.5));
            const temp = 22.4 - (skeletons.length * 0.8);

            ctx.font = '10px monospace';
            ctx.fillText(`EMF_FIELD:  ${emf.toFixed(2)} mG`, m + 15, HUD_TOP + 50);
            ctx.fillText(`COLD_SPOT:  ${temp.toFixed(1)}°C`, m + 15, HUD_TOP + 72);
            ctx.fillText(`SIGNAL_KV:  ${Math.round(96+Math.random()*3)}%`, m + 15, HUD_TOP + 94);
            ctx.fillText(`NEURAL_ISO: ${Math.round(isoLevel)}`, m + 15, HUD_TOP + 116);
            ctx.fillStyle = skeletons.length > 0 ? '#ff00ff' : '#22c55e';
            ctx.fillText(`SLS_DATA:   ${skeletons.length} DETECTADAS`, m + 15, HUD_TOP + 138);
        }

        // --- UI ACTIONS ---
        function setFilter(mode) {
            filterMode = mode;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.mode === mode) {
                    btn.classList.replace('text-white/20', 'text-white');
                    btn.classList.replace('border-white/5', 'border-white/40');
                    btn.classList.add('bg-white/10');
                } else {
                    btn.classList.replace('text-white', 'text-white/20');
                    btn.classList.replace('border-white/40', 'border-white/5');
                    btn.classList.remove('bg-white/10');
                }
            });
        }

        document.getElementById('photoBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = `OBR_SLS_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        };

        document.getElementById('recBtn').onclick = () => {
            if (isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('rec-indicator').classList.add('hidden');
                document.getElementById('rec-icon').className = "w-7 h-7 bg-red-600 rounded-sm";
                document.getElementById('rec-text').innerText = "REC";
            } else {
                chunks = [];
                const stream = canvas.captureStream(60);
                const combined = new MediaStream([...stream.getTracks(), ...audioStream.getAudioTracks()]);
                mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp8,opus', videoBitsPerSecond: 20000000 });
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `OBR_BLOOPER_REC_${Date.now()}.webm`; a.click();
                };
                mediaRecorder.start();
                isRecording = true;
                recStartTime = Date.now();
                document.getElementById('rec-indicator').classList.remove('hidden');
                document.getElementById('rec-icon').className = "w-5 h-5 bg-white rounded-sm";
                document.getElementById('rec-text').innerText = "STOP";
            }
        };

        setInterval(() => {
            if(isRecording) {
                const diff = Math.floor((Date.now() - recStartTime) / 1000);
                const m = Math.floor(diff / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                recTimerText.innerText = `${m}:${s}`;
            }
        }, 1000);

        function showError(msg) {
            document.getElementById('error-screen').classList.remove('hidden');
            document.getElementById('error-msg').innerText = msg;
        }

        // Iniciar Sistema
        window.onload = init;
    </script>
</body>
</html>
